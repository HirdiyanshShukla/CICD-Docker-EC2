apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-app
  namespace: django-app-ns
spec:
  replicas: 1 # Base replica count (Overridden in prod patch)
  selector:
    matchLabels:
      app: django-app
  template:
    metadata:
      labels:
        app: django-app
    spec:
      # 🛡️ Pillar 3: Security - Prevent token mounting by default
      automountServiceAccountToken: false
      
      # 🛡️ Pillar 3: Security - Force the pod to run as non-root (UID 1000)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        
      containers:
        - name: django-app
          image: localhost:5001/django-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
            
          # 🛡️ Pillar 3: Security - Drop all Linux capabilities & lock filesystem
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          # ⚖️ Pillar 2: Resource Management - Strict Guardrails
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              
          # 🩺 Pillar 1: Reliability - Readiness Probe
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            
          # 🩺 Pillar 1: Reliability - Liveness Probe
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            
          # 📁 Volume mount required because we made the Root FS read-only!
          # Apps need a place to write temporary files (like logs or compiled python)
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
              
      volumes:
        - name: tmp-volume
          emptyDir: {}
