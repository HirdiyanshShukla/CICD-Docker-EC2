name: Django App CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        cd main
        python manage.py test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build Docker Image and Tag
      run: |  
        docker build -t django-app .
        docker tag django-app:latest 235130525963.dkr.ecr.ap-south-1.amazonaws.com/cicd-test/django-app:${{ github.sha }}
        docker tag django-app:latest 235130525963.dkr.ecr.ap-south-1.amazonaws.com/cicd-test/django-app:latest

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 235130525963.dkr.ecr.ap-south-1.amazonaws.com

    - name: Push Docker Image to ECR
      run: |
        docker push 235130525963.dkr.ecr.ap-south-1.amazonaws.com/cicd-test/django-app:${{ github.sha }}
        docker push 235130525963.dkr.ecr.ap-south-1.amazonaws.com/cicd-test/django-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

    - name: SSH into EC2 and Run script
      run: |
        echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
        chmod 400 key.pem
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@ec2-13-127-151-113.ap-south-1.compute.amazonaws.com << 'EOF'
        aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 235130525963.dkr.ecr.ap-south-1.amazonaws.com
        docker pull 235130525963.dkr.ecr.ap-south-1.amazonaws.com/cicd-test/django-app:latest
        docker stop django-app || true
        docker rm django-app || true
        docker run -d -p 8000:8000 --name django-app 235130525963.dkr.ecr.ap-south-1.amazonaws.com/cicd-test/django-app:latest
        docker image prune -f
        EOF

